apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: opsci
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: opsci-backend
        imagePullPolicy: Never
        ports:
          - containerPort: 8000
        env:
          - name: DATABASE_URL
            value: postgresql://user:password@db:5432/opsci
          - name: RECOMMENDATION_URL
            value: http://reco:8001
          - name: TMDB_TOKEN
            valueFrom:
              secretKeyRef:
                name: tmdb-secret
                key: TMDB_TOKEN