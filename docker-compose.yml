services:

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/movies_db
      RECOMMENDATION_URL: http://reco:8001
    depends_on:
      - db
      - reco

  reco:
    build: ./recommendation
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/movies_db
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: movies_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: