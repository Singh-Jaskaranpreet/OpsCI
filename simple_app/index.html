<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Étudiant</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Portfolio Etudiant</h1>
        <p>Ajoutez les informations de votre profil ci-dessous :</p>
        
        <form id="studentForm">
            <label for="name">Nom :</label>
            <input type="text" id="name" name="name" required><br><br>
            
            <label for="dob">Date de naissance :</label>
            <input type="date" id="dob" name="dob" required><br><br>
            
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required><br><br>
            
            <label for="bio">Biographie :</label><br>
            <textarea id="bio" name="bio" rows="4" cols="50" required></textarea><br><br>
            
            <label for="skills">Compétences :</label>
            <input type="text" id="skills" name="skills" placeholder="Ex: Python, HTML, CSS" required><br><br>
            
            <label for="linkedin">Profil LinkedIn :</label>
            <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/votre-profil"><br><br>
            
            <button type="submit">Ajouter</button>
        </form>

        <div class="profile">
            <h2>Profil de l'Etudiant</h2>
            <p><strong>Nom :</strong> <span id="displayName"></span></p>
            <p><strong>Date de naissance :</strong> <span id="displayDob"></span></p>
            <p><strong>Email :</strong> <span id="displayEmail"></span></p>
            <p><strong>Biographie :</strong> <span id="displayBio"></span></p>
            <p><strong>Compétences :</strong> <span id="displaySkills"></span></p>
            <p><strong>LinkedIn :</strong> <a id="displayLinkedin" href="#" target="_blank">Voir le profil</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
