<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SINGHFLIX - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 onclick="window.location.href='index.html'" style="cursor:pointer">SINGHFLIX</h1>
  <button id="logoutBtn" class="btn-logout">Se déconnecter</button>
</header>

<div class="container">
  <div id="dashboardContent">
    <h2 id="userInfo">Mes Favoris</h2>
    <div id="favs" class="movies-grid"></div>

    <div id="reco-container"></div>
  </div>

  <div id="movieView" class="hidden">
    <button id="backBtn" onclick="window.location.href='index.html'">⬅ Retour à l'accueil</button>
    
    <div class="movie-detail-wrapper" style="display: flex; gap: 30px; margin-top: 20px;">
      <img id="movieImage" class="movie-poster" style="width: 250px; border-radius: 10px;">
      <div class="movie-info">
        <h2 id="title"></h2>
        <p id="genre" style="color: orange; font-weight: bold;"></p>
        <p id="year"></p>
        <p id="rating"></p>
        <p id="desc" style="line-height: 1.6;"></p>
        <div id="favContainer"></div>
      </div>
    </div>

    <div id="trailerContainer" style="margin-top:30px;">
      <iframe id="trailerIframe" class="hidden" width="100%" height="450" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
