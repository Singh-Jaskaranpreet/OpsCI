<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SINGHFLIX - Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="navbar">
    <h1 onclick="window.location.href='/'" style="cursor:pointer">SINGHFLIX</h1>
    <button id="logoutBtn" class="btn-logout">Se déconnecter</button>
  </header>

  <div class="container">
    <h2 id="userInfo">Mes Favoris</h2>
    <div id="favs" class="movies-grid"></div>
  </div>

  <script>
    const user = localStorage.getItem('userConnected');
    if(!user) window.location.href="/login";
    
    document.getElementById('userInfo').innerText = "Favoris de " + user;
    
    // Récupération des favoris depuis l'API PostgreSQL
    fetch('/api/favorites/' + user)
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('favs');
        if (data.length === 0) {
            grid.innerHTML = "<p>Vous n'avez pas encore de favoris.</p>";
            return;
        }
        data.forEach(f => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${f.image_url}" alt="${f.title}">
                    <h3>${f.title}</h3>
                </div>`;
        });
      });

    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('userConnected');
        window.location.href="/";
    };
  </script>
</body>
</html>
