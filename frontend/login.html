<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/static/style.css">
  <title>SINGHFLIX - Connexion</title>
</head>
<body>
  <div class="login-container">
    <h2>Connexion</h2>
    <input type="text" id="username" placeholder="Nom d'utilisateur">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="connecter()">Se connecter</button>
    <p>Pas de compte ? <a href="/register">S'inscrire ici</a></p>
    <p><a href="/">Retour à l'accueil</a></p>
  </div>

  <script>
    async function connecter() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const form = new FormData();
      form.append('username', u);
      form.append('password', p);

      const res = await fetch('/login', { method: 'POST', body: form });
      if (res.ok) {
        localStorage.setItem('userConnected', u);
        window.location.href = "/dashboard";
      } else {
        alert("Identifiants incorrects (SQL)");
      }
    }
  </script>
</body>
</html>
