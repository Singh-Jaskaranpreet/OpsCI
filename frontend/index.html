<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Streamly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1>STREAMLY</h1>
  <nav>
    <button onclick="showCategory('trending')">Trending</button>
    <button onclick="showCategory('popular')">Popular</button>
    <button onclick="showCategory('foryou')">For You</button>

  </nav>
</header>

<main class="container">
  <div id="movies" class="movies-grid"></div>
</main>

<script src="script.js"></script>

</body>
</html>
