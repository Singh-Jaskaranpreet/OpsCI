<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SINGHFLIX - Accueil</title>
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
  <header class="navbar">
    <h1 onclick="location.href='/'">SINGHFLIX</h1>

    <div class="action-buttons">
      <button id="loginBtn">Se connecter</button>
      <button id="dashboardBtn" class="hidden">Dashboard</button>
    </div>
  </header>

  <div class="search-container">
    <input type="text" id="search" placeholder="Rechercher un film...">
  </div>

  <main class="container">
    <div id="movies" class="movies-grid"></div>
    <button id="loadMore">Charger plus</button>

    <div id="movieView" class="hidden">
      <button id="backBtn">⬅ Retour</button>
      <img id="movieImage" class="movie-poster">
      <h2 id="title"></h2>
      <p id="desc"></p>
      <iframe id="trailerIframe" class="hidden" width="100%" height="400" frameborder="0" allowfullscreen></iframe>
    </div>
  </main>

  <script src="/frontend/script.js"></script>
</body>
</html>
