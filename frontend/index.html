<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SINGHFLIX - Accueil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <h1 onclick="goHome()" style="cursor:pointer">SINGHFLIX</h1>

    <div class="action-buttons">
      <button id="loginBtn">Se connecter</button>
      <button id="dashboardBtn" class="hidden"></button>
    </div>
  </header>

  <nav id="mainTabs" class="main-tabs">
    <button class="tab-btn active" data-view="catalog">Films</button>
    <button class="tab-btn" data-view="favorites">Mes favoris</button>
    <button class="tab-btn" data-view="recommendations">Top suggestions</button>
  </nav>

  <div id="searchFilters" class="search-container">
    <input type="text" id="search" placeholder="Rechercher un film...">
    <select id="genreFilter">
      <option value="">Tous les genres</option>
    </select>
  </div>

  <main class="container">
    <section id="catalogView" class="app-view">
      <div id="movies" class="movies-grid"></div>
      <div style="text-align:center; margin: 20px 0;">
        <button id="loadMore">Charger plus de films</button>
      </div>
    </section>

    <section id="favoritesView" class="app-view hidden">
      <h2>Mes Favoris</h2>
      <div id="homeFavs" class="movies-grid compact-grid"></div>
    </section>

    <section id="recommendationsView" class="app-view hidden">
      <div id="homeRecoContainer"></div>
    </section>

    <div id="movieView" class="hidden">
      <button id="backBtn" onclick="goHome()">⬅ Retour à l'accueil</button>
      
      <div class="movie-detail-wrapper" style="display: flex; gap: 30px; margin-top: 20px;">
        <img id="movieImage" class="movie-poster" style="width: 250px; border-radius: 10px;">
        <div class="movie-info">
          <h2 id="title"></h2>
          <p id="genre" style="color: orange; font-weight: bold;"></p>
          <p id="year"></p>
          <p id="rating"></p>
          <p id="desc"></p>
          <div id="favContainer"></div>
        </div>
      </div>

      <div id="trailerContainer" style="margin-top:20px;">
        <iframe id="trailerIframe" class="hidden" width="100%" height="450" frameborder="0" allowfullscreen></iframe>
      </div>

      <div id="reco-container"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
