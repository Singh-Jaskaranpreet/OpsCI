image: node:18

stages:
  - test
  - unit-test
  - deploy

job-test:
	
  stage: test
  script:
    - cd ./simple_app
    - |
      if [ ! -f index.html ] || [ ! -f styles.css ] || [ ! -f script.js ]; then
       exit 1
      fi

job-unit-test:
	stage: unit-test
	script:
		- npm install jest
		- npm test __test__/
deploy:
  stage: deploy
  script:
    - mkdir -p public
    - cp simple_app/index.html simple_app/styles.css simple_app/script.js public/
  artifacts:
    paths:
      - public
  only:
    - main

