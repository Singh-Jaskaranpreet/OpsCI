workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "feature/front-back"'
    - when: never

image: node:18

stages:
  - test
  - unit-test
  - build-docker
  - deploy

# 1. STAGE TEST : Vérification avec syntaxe "Block Scalar" (|) pour éviter les erreurs
check-files:
  stage: test
  script:
    - echo "Vérification de l'arborescence complète..."
    - ls -R
    - |
      echo "Vérification du Frontend..."
      if [ ! -f frontend/index.html ] || [ ! -f frontend/script.js ] || [ ! -f frontend/Dockerfile ] || [ ! -f frontend/nginx.conf ]; then 
        echo "Erreur: Fichiers Frontend critiques manquants"; exit 1; 
      fi
    - |
      echo "Vérification des Backends..."
      if [ ! -f backend/main.py ] || [ ! -f backend/Dockerfile ] || [ ! -f recommendation/recom.py ] || [ ! -f recommendation/Dockerfile ]; then 
        echo "Erreur: Fichiers Backend ou Recommendation critiques manquants"; exit 1; 
      fi
  tags:
    - linux_mac

# 2. STAGE UNIT-TEST
frontend-jest:
  stage: unit-test
  script:
    - cd frontend
    - npm install jest jest-environment-jsdom jest-junit # Ajout de jest-junit
    - npx jest ../__tests__/* --ci --reporters=default --reporters=jest-junit # Génère le rapport
  artifacts:
    when: always
    reports:
      junit: frontend/junit.xml # Indique à GitLab où lire les résultats
  rules:
    - exists:
        - __tests__/**/*

backend-syntax:
  stage: unit-test
  image: python:3.11-slim
  script:
    - pip install -r backend/requirements.txt
    - pip install -r recommendation/requirements.txt
    - python -m py_compile backend/*.py
    - python -m py_compile recommendation/*.py

# 3. STAGE BUILD-DOCKER
build-microservices:
  stage: build-docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
  script:
    - docker build -t singhflix-frontend ./frontend
    - docker build -t singhflix-backend ./backend
    - docker build -t singhflix-reco ./recommendation

# 4. STAGE DEPLOY
pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp frontend/index.html frontend/style.css frontend/script.js frontend/login.html frontend/register.html public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'